<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ - FAT CAT STORE</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
<div class="login-page">
    <div class="login-overlay"></div>
    <div class="login-card">
        <div class="login-logo">🐱</div>
        <h2>FAT CAT STORE</h2>
        <p class="login-sub">เข้าสู่ระบบเพื่อเริ่มช้อปปิ้ง</p>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <!-- ปุ่ม Google -->
        <a href="/auth/google" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20">
            เข้าสู่ระบบด้วย Google
        </a>

        <div class="divider"><span>หรือ</span></div>

        <form method="POST">
            <label>ชื่อผู้ใช้</label>
            <input type="text" name="username" placeholder="กรอกชื่อผู้ใช้" required>
            <label>รหัสผ่าน</label>
            <div class="input-wrap">
                <input type="password" name="password" id="pwd" placeholder="กรอกรหัสผ่าน" required>
                <span class="eye-btn" onclick="togglePwd()">👁️</span>
            </div>
            <div class="g-recaptcha" data-sitekey="6Le5B-4sAAAAANWBqYkmUiEfMrGjdDi1_1yb5fh0" style="margin-bottom:12px"></div>
            <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
        </form>

        <p class="auth-link">ยังไม่มีบัญชี? <a href="/register">สมัครสมาชิก</a></p>
    </div>
</div>

<script>
function togglePwd() {
    const p = document.getElementById("pwd");
    p.type = p.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
