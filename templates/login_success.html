<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบสำเร็จ</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo"><a href="/" style="color:white;text-decoration:none">🐱 FAT CAT STORE</a></div>
        <div class="nav-right">
            <a href="/profile" class="btn-register">👤 {{ username }}</a>
            <a href="/logout" class="btn-logout">ออกจากระบบ</a>
        </div>
    </div>

    <div class="login-success-page">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h2>เข้าสู่ระบบสำเร็จ!</h2>
            <p class="success-sub">ยินดีต้อนรับกลับมา <strong>{{ username }}</strong></p>

            <div class="success-detail">
                <div class="detail-row">
                    <span>👤 ชื่อผู้ใช้</span>
                    <strong>{{ username }}</strong>
                </div>
                <div class="detail-row">
                    <span>💰 เครดิตคงเหลือ</span>
                    <strong>{{ credit }} บาท</strong>
                </div>
            </div>

            <div class="success-buttons">
                <a href="/" class="btn-home">🏠 กลับหน้าแรก</a>
                <a href="/profile" class="btn-profile">👤 ดูโปรไฟล์</a>
            </div>

            <p style="color:#8b8fad;font-size:12px;margin-top:1rem">
                กลับหน้าแรกอัตโนมัติใน <span id="countdown">5</span> วินาที
            </p>
        </div>
    </div>

    <script>
        let count = 5
        const el = document.getElementById("countdown")
        setInterval(() => {
            count--
            el.textContent = count
            if (count <= 0) window.location.href = "/"
        }, 1000)
    </script>
</body>
</html>
