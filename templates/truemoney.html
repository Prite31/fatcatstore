<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เติมเครดิตด้วยอั่งเปา - FAT CAT STORE</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo"><a href="/" style="color:white;text-decoration:none">🐱 FAT CAT STORE</a></div>
        <div class="nav-right">
            <span class="credit-badge">💰 {{ credit }} บาท</span>
            <a href="/logout" class="btn-logout">ออกจากระบบ</a>
        </div>
    </div>

    <div class="payment-box">
        <h2>🧧 เติมเครดิตด้วยอั่งเปา</h2>

        {% if success %}
        <div class="slip-success">
            <p>✅ ส่งลิงก์อั่งเปาสำเร็จ!</p>
            <p>รอ Admin ตรวจสอบและเติมเครดิตภายใน 5 นาที</p>
            <a href="/">กลับหน้าแรก</a>
        </div>
        {% elif error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        {% if not success %}
</body>
</html>
